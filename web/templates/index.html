<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>星の館 全天カメラ</title><link rel="stylesheet" href="/static/style.css"></head><body>
<header><h1>🌌 星の館 全天カメラ AIエージェント <span>Ver.{{ version }}</span></h1><p>Hoshinoyakata All-Sky AI Agent</p></header>
<main class="grid"><section class="panel"><h2>ライブビュー（全天）</h2><div class="viewer"><img id="sky"><div class="fisheye-guide"></div><div id="empty">画像待機中</div></div><div class="buttons"><button onclick="capture()">📷 写真を撮影</button><button onclick="refreshImage()">🔄 最新画像に更新</button><button onclick="toggleFullscreen()">⛶ 全画面表示</button></div><p id="message"></p></section>
<section class="panel"><h2>現在の状態</h2><div class="cards"><div class="card"><b>🌡 温度</b><strong id="temp">準備中</strong></div><div class="card"><b>💧 湿度</b><strong id="hum">準備中</strong></div><div class="card"><b>気圧</b><strong id="press">準備中</strong></div><div class="card"><b>☁ AI雲量</b><strong id="cloud">--%</strong></div><div class="card"><b>🌙 月齢</b><strong id="moon">--</strong></div><div class="card"><b>⭐ SQM</b><strong id="sqm">--</strong></div><div class="card"><b>🌬 風速</b><strong id="wind">--</strong></div></div><p id="sensorMsg"></p></section></main><section class="panel saved"><h2>保存画像</h2><div id="savedImage"></div></section><script src="/static/app.js"></script></body></html>
