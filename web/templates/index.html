<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ site_name }}</title><link rel="stylesheet" href="/static/style.css"></head><body>
<header><h1>🌌 {{ site_name }} <span>Ver.{{ version }}</span></h1><p>Hoshinoyakata All-Sky AI Agent</p></header>
<main class="layout">
<section class="panel main">
<h2>ライブビュー（全天）</h2>
<div id="viewer" class="viewer show-guide show-dir">
<img id="sky"><div id="empty">画像待機中</div>
<div class="guide outer"></div><div class="guide horizon"></div><div class="cross v"></div><div class="cross h"></div>
<div class="dir n">N</div><div class="dir e">E</div><div class="dir s">S</div><div class="dir w">W</div>
</div>
<div class="buttons">
<button onclick="capture()">📷 写真を撮影</button>
<button onclick="recordVideo()">🎥 MP4録画</button>
<button onclick="loadStatus(true)">🔄 最新画像に更新</button>
<button onclick="toggleGuide()">⭕ ガイドON/OFF</button>
<button onclick="toggleFullscreen()">⛶ 全画面表示</button>
</div>
<p id="message"></p>
</section>
<section class="panel side"><h2>現在の状態</h2>
<div class="card"><span>🌡 温度</span><b id="temp">未読込</b></div>
<div class="card"><span>💧 湿度</span><b id="hum">未読込</b></div>
<div class="card"><span>気圧</span><b id="press">未読込</b></div>
<div class="card"><span>☁ AI雲量</span><b id="cloud">--</b></div>
<div class="card"><span>🌙 月齢</span><b id="moon">--</b></div>
<div class="card"><span>⭐ SQM</span><b id="sqm">--</b></div>
<div class="card"><span>🌬 風速</span><b id="wind">--</b></div>
<div class="sensor" id="sensorMsg">--</div>
</section>
</main>
<section class="bottom">
<div class="panel"><h2>ログ</h2><div id="logs"></div></div>
<div class="panel"><h2>システム情報</h2><div id="systemInfo"></div></div>
</section>
<script src="/static/app.js"></script></body></html>
