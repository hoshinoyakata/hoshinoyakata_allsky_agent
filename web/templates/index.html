<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ site_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>🌌 {{ site_name }} <span>Ver.{{ version }}</span></h1>
  <p>Hoshinoyakata All-Sky AI Agent</p>
</header>

<main class="layout">
  <section class="panel main">
    <h2>ライブビュー（全天）</h2>
    <div id="viewer" class="viewer">
      <img id="sky" alt="全天画像">
      <div id="guide" class="fisheye-guide"></div>
      <div id="empty">画像待機中</div>
    </div>
    <div class="buttons">
      <button onclick="capture()">📷 写真を撮影</button>
      <button onclick="recordVideo()">🎥 MP4動画</button>
      <button onclick="refreshImage()">🔄 最新画像に更新</button>
      <button onclick="toggleFullscreen()">⛶ 全画面表示</button>
    </div>
    <p id="message"></p>
  </section>

  <section class="panel side">
    <h2>現在の状態</h2>
    <div class="card"><span>🌡 温度</span><b id="temp">準備中</b></div>
    <div class="card"><span>💧 湿度</span><b id="hum">準備中</b></div>
    <div class="card"><span>気圧</span><b id="press">準備中</b></div>
    <div class="card"><span>☁ AI雲量</span><b id="cloud">--%</b></div>
    <div class="card"><span>🌙 月齢</span><b id="moon">--</b></div>
    <div class="card"><span>⭐ SQM</span><b id="sqm">--</b></div>
    <div class="card"><span>🌬 風速</span><b id="wind">--</b></div>
    <button onclick="loadStatus()">今すぐ更新</button>
    <p id="sensorMsg"></p>
  </section>
</main>

<section class="panel saved">
  <h2>保存画像</h2>
  <div id="savedImage"></div>
</section>

<script src="/static/app.js"></script>
</body>
</html>
