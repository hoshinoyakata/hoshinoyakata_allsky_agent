<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>星の館 全天カメラ v0.2</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="page">
    <h1>ライブビュー（全天）</h1>

    <section class="card">
      <div id="viewer" class="viewer">
        <img id="liveImage" class="live-img" src="/video_feed" alt="全天カメラ ライブ映像">
      </div>

      <div class="buttons">
        <button onclick="captureImage()">📷 写真を撮影</button>
        <button onclick="location.reload()">🔄 最新画像に更新</button>
        <button onclick="enterFullscreen()">⛶ 全画面表示</button>
        <button onclick="exitFullscreen()">↩ 全画面解除</button>
      </div>

      <p id="message" class="message"></p>
    </section>

    <section class="card">
      <h2>保存画像</h2>
      <div id="gallery" class="gallery">
        {% for file in files %}
          <a href="/captures/{{ file }}" target="_blank">
            <img src="/captures/{{ file }}" alt="{{ file }}">
          </a>
        {% endfor %}
      </div>
    </section>
  </main>

<script>
async function captureImage(){
  const res = await fetch('/capture');
  const data = await res.json();
  const msg = document.getElementById('message');
  if(data.ok){
    msg.textContent = '保存しました: ' + data.filename;
  } else {
    msg.textContent = '保存に失敗しました';
  }
}

function enterFullscreen(){
  const el = document.getElementById('viewer');
  if (el.requestFullscreen) el.requestFullscreen();
}

function exitFullscreen(){
  if (document.fullscreenElement) document.exitFullscreen();
}
</script>
</body>
</html>
