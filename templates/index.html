<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>星の館 AllSky AI Agent</title><link rel="stylesheet" href="/static/style.css"></head><body>
<header><div class="brand">🌌 星の館 全天カメラ AIエージェント <span>Ver.{{version}}</span></div><div id="clock">--</div></header>
<main class="grid">
<section class="panel main"><h2>🟢 ライブビュー（全天）</h2><div class="skywrap"><img id="sky" src="/static/noimage.svg"><div class="dir n">N</div><div class="dir e">E</div><div class="dir w">W</div><div class="dir s">S</div></div><div class="buttons"><button onclick="capture()">📷 写真を撮影</button><button onclick="refreshStatus()">🔄 最新画像に更新</button><button onclick="full()">⛶ 全画面</button><button onclick="video()">🎥 MP4作成</button></div><div id="message"></div></section>
<aside class="panel"><h2>🌡 環境</h2><div class="cards"><div>温度<b id="temp">--</b></div><div>湿度<b id="hum">--</b></div><div>気圧<b id="press">--</b></div></div><h2>☁ AI雲量</h2><div class="big"><span id="cloud">--</span>%</div><h2>🌙 月齢</h2><div class="big moon"><span id="moon">--</span></div><p id="moonLabel">--</p><h2>⭐ SQM</h2><div class="big sqm"><span id="sqm">--</span></div></aside>
<aside class="panel"><h2>🔄 システム/更新</h2><p>時刻: <b id="time">--</b></p><p>状態: <b class="ok">正常</b></p><button onclick="updateNow()">⬆ 今すぐ更新</button><p class="small">GitHub Push後、ラズパイは5分以内に自動更新します。</p><h2>🎞 動画</h2><div id="videos"></div></aside>
<section class="panel thumbs"><h2>📷 最新画像</h2><div id="thumbs"></div></section>
</main><footer>© Hoshinoyakata Observatory</footer><script src="/static/app.js"></script></body></html>
